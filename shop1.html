<!-- shop1.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Devika's Clothing Store - Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Load cart.js first -->
  <script src="js/cart.js"></script>
</head>
<body class="bg-gray-100">

<!-- Navbar with Cart button -->
<nav class="flex items-center justify-between px-6 py-4 bg-indigo-600 text-white">
  <a href="up.html" class="text-xl font-bold">Devika's Clothing</a>
  <div class="flex space-x-4">
    <a href="up.html" class="hover:underline">Home</a>
    <a href="shop1.html" class="hover:underline">Shop</a>
    <button onclick="openCartModal()" class="relative">
      🛒 Cart <span id="cart-count" class="absolute -top-2 -right-4 bg-red-500 text-xs rounded-full px-2">0</span>
    </button>
  </div>
</nav>

<!-- Products -->
<div class="max-w-7xl mx-auto py-10 px-4">
  <h2 class="text-3xl font-bold mb-6 text-center">Shop All</h2>
  <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

    <!-- Men's Jacket -->
    <div class="bg-white rounded shadow p-4 text-center">
      <img src="https://exotix.in/wp-content/uploads/2025/05/3db2b961d0dd93aaf7b580a97f099132-600x600.jpg" alt="Men's Jacket" class="w-full mb-4">
      <h5 class="text-lg font-semibold mb-2">Men's Jacket</h5>
      <p class="mb-4">Rs. 2390/-</p>
      <button class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700"
        onclick="addToCart({ name: 'Men\'s Jacket', price: 2390 })">
        Add to Cart
      </button>
    </div>

    <!-- Women's Dress -->
    <div class="bg-white rounded shadow p-4 text-center">
      <img src="https://littleboxindia.com/cdn/shop/files/DR1680_1_1_720x.jpg?v=1745304003" alt="Women's Dress" class="w-full mb-4">
      <h5 class="text-lg font-semibold mb-2">Women's Floral Dress</h5>
      <p class="mb-4">Rs. 1890/-</p>
      <button class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700"
        onclick="addToCart({ name: 'Women\'s Floral Dress', price: 1890 })">
        Add to Cart
      </button>
    </div>

    <!-- Running Shoes -->
    <div class="bg-white rounded shadow p-4 text-center">
      <img src="https://m.media-amazon.com/images/I/614aiM56siL._SL1500_.jpg" alt="Running Shoes" class="w-full mb-4">
      <h5 class="text-lg font-semibold mb-2">Running Shoes</h5>
      <p class="mb-4">Rs. 2990/-</p>
      <button class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700"
        onclick="addToCart({ name: 'Running Shoes', price: 2990 })">
        Add to Cart
      </button>
    </div>

    <!-- Casual T-Shirt -->
    <div class="bg-white rounded shadow p-4 text-center">
      <img src="https://encrypted-tbn2.gstatic.com/shopping?q=tbn:ANd9GcRW6iyZigrT7HluIPEkOQugT09ap1VXq5PGdCGi1R1HaQBlh6l-npSU5RguIoBrjlJ5WRqrXSpXyEIfaMUFlg3FxmsJ7N-iszNXTbcbtc0Th54RJHlCPjrbvw" alt="Casual T-Shirt" class="w-full mb-4">
      <h5 class="text-lg font-semibold mb-2">Casual T-Shirt</h5>
      <p class="mb-4">Rs. 790/-</p>
      <button class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700"
        onclick="addToCart({ name: 'Casual T-Shirt', price: 790 })">
        Add to Cart
      </button>
    </div>

    <!-- Formal Shoes -->
    <div class="bg-white rounded shadow p-4 text-center">
      <img src="https://cliveshoes.com/cdn/shop/files/M10074307BLK.jpg?v=1746780353" alt="Formal Shoes" class="w-full mb-4">
      <h5 class="text-lg font-semibold mb-2">Formal Shoes</h5>
      <p class="mb-4">Rs. 2490/-</p>
      <button class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700"
        onclick="addToCart({ name: 'Formal Shoes', price: 2490 })">
        Add to Cart
      </button>
    </div>

    <!-- Summer Dress -->
    <div class="bg-white rounded shadow p-4 text-center">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR1DjHK5s3YXtrbp00PQBf0znfnjOywJiWrgN53k50XxdMJYxmt8A2N2SF1OBY33nLQ6h0&usqp=CAU" alt="Summer Dress" class="w-full mb-4">
      <h5 class="text-lg font-semibold mb-2">Summer Dress</h5>
      <p class="mb-4">Rs. 1590/-</p>
      <button class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700"
        onclick="addToCart({ name: 'Summer Dress', price: 1590 })">
        Add to Cart
      </button>
    </div>

  </div>
</div>

<!-- Cart Modal -->
<div id="cartModal" class="hidden fixed inset-0 flex items-center justify-center bg-black bg-opacity-50">
  <div class="bg-white rounded shadow p-6 w-full max-w-md">
    <div class="flex justify-between items-center mb-4">
      <h5 class="text-xl font-bold">Your Cart</h5>
      <button onclick="closeCartModal()" class="text-gray-500 hover:text-black">&times;</button>
    </div>
    <div id="cart-items"></div>
  </div>
</div>

<!-- Scripts -->
<script>
  function openCartModal() {
    document.getElementById('cartModal').classList.remove('hidden');
    displayCartItems('cart-items');
  }
  function closeCartModal() {
    document.getElementById('cartModal').classList.add('hidden');
  }
  updateCartCount();
</script>

</body>
</html>
