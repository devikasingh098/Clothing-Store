<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Your Cart - Devika's Clothing Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
  <a class="navbar-brand" href="up.html">Devika's Clothing</a>
  <div class="ms-auto">
    <a href="up.html" class="btn btn-outline-light me-2">Home</a>
    <a href="shop1.html" class="btn btn-outline-light me-2">Shop</a>
    <a href="cart.html" class="btn btn-outline-light">
      🛒 Cart <span id="cart-count" class="badge bg-danger">0</span>
    </a>
  </div>
</nav>

<!-- Cart Page -->
<div class="container my-5">
  <h2 class="text-center mb-4">Your Shopping Cart</h2>
  <div id="cart-items"></div>
</div>

<!-- Footer -->
<footer class="text-center py-4 bg-light">
  <p class="mb-0">&copy; 2025 Devika's Clothing Store. Happy Shopping!</p>
</footer>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/cart.js"></script>
<script>
  // Override displayCartItems for the full cart page layout
  function displayCartItems(containerId) {
    const cart = getCart();
    const container = document.getElementById(containerId);
    if (!container) return;

    if (cart.length === 0) {
      container.innerHTML = `
        <div class="text-center py-5">
          <p class="text-muted fs-5">Your cart is empty.</p>
          <a href="shop1.html" class="btn btn-primary mt-2">Continue Shopping →</a>
        </div>`;
      return;
    }

    const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);

    container.innerHTML = `
      <table class="table align-middle">
        <thead class="table-light">
          <tr>
            <th>Item</th>
            <th class="text-center">Quantity</th>
            <th class="text-end">Unit Price</th>
            <th class="text-end">Subtotal</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${cart.map(item => `
            <tr>
              <td><strong>${item.name}</strong></td>
              <td class="text-center">
                <div class="d-flex align-items-center justify-content-center gap-2">
                  <button class="btn btn-sm btn-outline-secondary" onclick="changeQty('${item.name}', -1)">−</button>
                  <span>${item.qty}</span>
                  <button class="btn btn-sm btn-outline-secondary" onclick="changeQty('${item.name}', 1)">+</button>
                </div>
              </td>
              <td class="text-end">Rs. ${item.price.toLocaleString()}/-</td>
              <td class="text-end">Rs. ${(item.price * item.qty).toLocaleString()}/-</td>
              <td class="text-end">
                <button class="btn btn-sm btn-outline-danger" onclick="removeFromCart('${item.name}')">✕ Remove</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
        <tfoot class="table-light">
          <tr>
            <td colspan="3"><strong>Total</strong></td>
            <td class="text-end" colspan="2"><strong>Rs. ${total.toLocaleString()}/-</strong></td>
          </tr>
        </tfoot>
      </table>

      <div class="d-flex justify-content-between mt-3">
        <button class="btn btn-outline-danger" onclick="clearCart()">🗑 Clear Cart</button>
        <div class="d-flex gap-2">
          <a href="shop1.html" class="btn btn-outline-primary">← Continue Shopping</a>
          <button class="btn btn-success" onclick="checkout()">Proceed to Checkout →</button>
        </div>
      </div>
    `;
  }

  // Initialize
  updateCartCount();
  displayCartItems('cart-items');
</script>

</body>
</html>
